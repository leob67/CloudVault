<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudVault - Redirecting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
      max-width: 400px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #fca5a5;
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 { color: #dc2626; margin-bottom: 10px; }
    p { color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>CloudVault</h1>
    <p>Completing sign in...</p>
  </div>
  <script type="module">
    import { supabase } from './src/lib/supabase.js';

    // Handle the OAuth callback
    async function handleCallback() {
      try {
        const hash = window.location.hash;

        if (hash) {
          // Handle auth callback with tokens in URL
          const { data, error } = await supabase.auth.getSession();

          if (error) {
            console.error('Auth error:', error);
            window.opener?.postMessage({ type: 'AUTH_ERROR', error: error.message }, window.location.origin);
          } else if (data.session) {
            window.opener?.postMessage({ type: 'AUTH_SUCCESS', session: data.session }, window.location.origin);
          }
        }

        // Complete OAuth flow
        await supabase.auth.getSession();

        // Give time for popup to complete
        setTimeout(() => {
          window.close();
        }, 1000);

      } catch (error) {
        console.error('Callback error:', error);
        window.opener?.postMessage({ type: 'AUTH_ERROR', error: error.message }, window.location.origin);
        setTimeout(() => window.close(), 2000);
      }
    }

    handleCallback();
  </script>
</body>
</html>
